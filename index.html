<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* إعدادات الصفحة الأساسية */
        body {
            background-color: #050505; /* لون خلفية الصفحة كاملة */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* حاوية القالب (الـ Card الرئيسي) */
        .lp-card {
            background-color: #0f0f12; /* لون الإطار الداكن */
            width: 90%;
            max-width: 450px;
            padding: 40px 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            border: 1px solid #1a1a1e;
        }

        /* علامة الإغلاق (لشكل احترافي فقط) */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            opacity: 0.7;
        }

        /* العنوان الرئيسي */
        .headline {
            color: #ffffff;
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        /* العنوان الفرعي (الوعد السريع) */
        .sub-headline {
            color: #ffb347; /* لون برتقالي ذهبي */
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        /* الزر (CTA) */
        .cta-button {
            background-color: #5e5ce6; /* اللون البنفسجي */
            color: white;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            text-decoration: none;
        }

        .cta-button:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        /* حاوية الصورة والمميزات */
        .image-section {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .image-section img {
            width: 100%;
            display: block;
            filter: brightness(0.7); /* تغميق الصورة لتبرز النصوص */
        }

        /* قائمة المميزات فوق الصورة */
        .features-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            text-align: left;
        }

        .feature-item {
            color: #fff;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .feature-item span {
            color: #ffb347; /* لون علامة الصح */
        }
    </style>
</head>
<body>

    <div class="lp-card">
        <div class="close-btn">✕</div>
        
        <h1 class="headline">Create NSFW AI Content</h1>
        <div class="sub-headline">Join free in 15 seconds</div>
        
        <a href="رابط_العرض_هنا" class="cta-button">
            Sign Up →
        </a>

        <div class="image-section">
            <img src="https://via.placeholder.com/400x225/111/fff?text=AI+Girl+Image" alt="AI Content">
            
            <div class="features-overlay">
                <div class="feature-item"><span>✔</span> Create AI Images (No Filter)</div>
                <div class="feature-item"><span>✔</span> Starter credits included</div>
                <div class="feature-item"><span>✔</span> No credit card required</div>
            </div>
        </div>
    </div>

</body>
</html>
